<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 HBD Ensemble — ホスト</title>

<!-- QRコード生成ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import { db } from './firebase-config.js';
import { ref, set, onValue, update }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// =====================================================
// 定数
// =====================================================
const BPM = 90, BEAT_SEC = 60 / BPM, DUR_RATIO = 0.85;
const PERFECT_WINDOW = 0.13, GOOD_WINDOW = 0.24;
const SCROLL_SPEED = 280, LONG_THRESHOLD = 0.45;
const COUNTDOWN_MS = 4000;
// 全端末で同じ値を使うことで、画面サイズに関わらずタイミングを同期する
const FALL_TIME = 2.0; // ノーツが画面上端からヒットラインに到達するまでの固定秒数

// =====================================================
// 楽譜データ
// =====================================================
const MELODY_SCORE = [
  ['C5',0,0.75],['C5',0.75,0.25],['D5',1,1],['C5',2,1],['F5',3,1],['E5',4,2],
  ['C5',6,0.75],['C5',6.75,0.25],['D5',7,1],['C5',8,1],['G5',9,1],['F5',10,2],
  ['C5',12,0.75],['C5',12.75,0.25],['A5',13,1],['A5',14,1],['F5',15,1],
  ['E5',16,0.5],['E5',16.5,0.5],['D5',17,2],
  ['Bb5',19,0.75],['Bb5',19.75,0.25],['A5',20,1],['F5',21,1],['G5',22,1],['F5',23,2],
];
const HARMONY_SCORE = [
  ['E5',0,0.75],['E5',0.75,0.25],['F5',1,1],['E5',2,1],['A5',3,1],['G5',4,2],
  ['E5',6,0.75],['E5',6.75,0.25],['F5',7,1],['E5',8,1],['Bb5',9,1],['A5',10,2],
  ['E5',12,0.75],['E5',12.75,0.25],['C5',13,1],['C5',14,1],['A5',15,1],
  ['G5',16,0.5],['G5',16.5,0.5],['F5',17,2],
  ['D5',19,0.75],['D5',19.75,0.25],['C5',20,1],['A5',21,1],['Bb5',22,1],['A5',23,2],
];
const BASS_SCORE = [
  ['F3',0,1.5],['C3',1.5,1],['F3',2.5,1.5],
  ['F3',4,1.5],['C3',6,1],['F3',7,1],
  ['F3',8,1.5],['C3',10,1],['F3',11,1],
  ['F3',12,1.5],['C3',14,1],['Bb3',15,1],['C3',16,1],
  ['F3',17,2],
  ['Bb3',19,1.5],['F3',21,1],['C3',22,1],['F3',23,2],
];

// パート割り当て（人数・index・seedから決定）
function assignParts(playerCount, myIndex, seed) {
  const all = [
    ...MELODY_SCORE.map(n=>[...n,'melody']),
    ...HARMONY_SCORE.map(n=>[...n,'harmony']),
    ...BASS_SCORE.map(n=>[...n,'bass']),
  ];
  // 1人（テスト）は全ノーツをそのまま返す
  if (playerCount === 1) return all;
  // 2人以上: seedでシャッフルして均等分配
  let s = seed >>> 0;
  function rand() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ s>>>15, 1 | s);
    t ^= t + Math.imul(t ^ t>>>7, 61 | t);
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  }
  for (let i = all.length-1; i > 0; i--) {
    const j = Math.floor(rand() * (i+1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  const chunk = Math.ceil(all.length / playerCount);
  return all.slice(myIndex * chunk, (myIndex+1) * chunk);
}

// =====================================================
// 音程テーブル / カラー
// =====================================================
const NOTE_FREQ = {
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'Bb3':233.08,
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'Bb4':466.16,
  'C5':523.25,'D5':587.33,'E5':659.26,'F5':698.46,'G5':783.99,'A5':880.00,'Bb5':932.33,
};
const PART_COLOR = {
  melody:  { fill:'rgba(255,215,0,0.85)',   stroke:'rgba(255,215,0,1)'   },
  harmony: { fill:'rgba(255,107,157,0.85)', stroke:'rgba(255,107,157,1)' },
  bass:    { fill:'rgba(0,229,255,0.75)',   stroke:'rgba(0,229,255,1)'   },
};
const JUDGED_COLOR = {
  perfect: { fill:'rgba(255,215,0,0.2)',   stroke:'rgba(255,215,0,0.35)'   },
  good:    { fill:'rgba(105,240,174,0.2)', stroke:'rgba(105,240,174,0.35)' },
  miss:    { fill:'rgba(255,82,82,0.15)',  stroke:'rgba(255,82,82,0.25)'   },
};

// =====================================================
// オーディオ
// =====================================================
let audioCtx = null;
const activeOsc = {};

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playNote(name, part) {
  if (!audioCtx || !NOTE_FREQ[name]) return;
  stopNote(name);
  const f = NOTE_FREQ[name];
  const t = audioCtx.currentTime;

  if (part === 'bass') {
    // ベース: サブオクターブ + ノコギリ波 + アタックエンベロープで迫力を出す
    const o1 = audioCtx.createOscillator(), g1 = audioCtx.createGain(); // メイン
    const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain(); // ノコギリ波（倍音）
    const o3 = audioCtx.createOscillator(), g3 = audioCtx.createGain(); // サブオクターブ
    o1.type = 'sine';     o1.frequency.value = f;
    o2.type = 'sawtooth'; o2.frequency.value = f;
    o3.type = 'sine';     o3.frequency.value = f / 2; // 1オクターブ下
    // ドン！と鳴るアタックエンベロープ
    g1.gain.setValueAtTime(0, t); g1.gain.linearRampToValueAtTime(0.45, t + 0.02);
    g2.gain.setValueAtTime(0, t); g2.gain.linearRampToValueAtTime(0.08, t + 0.02);
    g3.gain.setValueAtTime(0, t); g3.gain.linearRampToValueAtTime(0.28, t + 0.04);
    o1.connect(g1); g1.connect(audioCtx.destination);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o3.connect(g3); g3.connect(audioCtx.destination);
    o1.start(); o2.start(); o3.start();
    activeOsc[name] = {o1,o2,o3,g1,g2,g3};
  } else {
    // メロディ: 大きめ / ハモリ: 控えめ
    const vol = part === 'harmony' ? 0.22 : 0.40;
    const o1 = audioCtx.createOscillator(), g1 = audioCtx.createGain();
    const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
    o1.type = 'sine';     o1.frequency.value = f; g1.gain.value = vol;
    o2.type = 'triangle'; o2.frequency.value = f; g2.gain.value = vol * 0.3;
    o1.connect(g1); g1.connect(audioCtx.destination);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o1.start(); o2.start();
    activeOsc[name] = {o1,o2,g1,g2};
  }
}
function stopNote(name) {
  const e = activeOsc[name]; if (!e) return;
  const t = audioCtx.currentTime;
  e.g1.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  e.g2.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  if (e.g3) e.g3.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  setTimeout(()=>{
    try{e.o1.stop();e.o2.stop();}catch(_){}
    try{if(e.o3)e.o3.stop();}catch(_){}
  }, 100);
  delete activeOsc[name];
}
function stopAllNotes() { Object.keys(activeOsc).forEach(stopNote); }

// =====================================================
// ゲーム状態
// =====================================================
let gs = {
  screen: 'setup',
  roomId: null, myUid: null, myIndex: 0, playerCount: 2, seed: 0,
  notes: [], startTime: 0, songDuration: 0,
  combo: 0, maxCombo: 0, score: 0, perfect: 0, good: 0, miss: 0, totalNotes: 0,
  animFrame: null, btnHeld: false, unsubscribes: [],
  serverTimeOffset: 0, // サーバー時刻と端末時刻のズレ(ms)
};

function uid() { return Math.random().toString(36).slice(2,9); }

// 読み取りやすい5文字のルームコードを生成（紛らわしい文字を除外）
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // I,O,0,1 を除外
  let code = '';
  for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}
function buildNotes(sp) {
  return sp.map((n,i) => ({
    idx: i, note: n[0],
    startTime: n[1]*BEAT_SEC,
    duration:  n[2]*BEAT_SEC*DUR_RATIO,
    part: n[3],
    isLong: n[2]*BEAT_SEC*DUR_RATIO >= LONG_THRESHOLD,
    judged: false, judgment: null, holdActive: false, holdReleased: false,
  }));
}
function getCurrentTime() {
  if (!audioCtx) return 0;
  return audioCtx.currentTime - gs.startTime;
}

// サーバー時刻基準のDate.now()（端末間のクロックズレを補正）
function serverNow() { return Date.now() + gs.serverTimeOffset; }

// Firebaseからサーバー時刻オフセットを取得してgsに保存
onValue(ref(db, '.info/serverTimeOffset'), snap => {
  gs.serverTimeOffset = snap.val() || 0;
}, { onlyOnce: true });

// =====================================================
// 画面管理
// =====================================================
const SCREENS = ['setup','waiting','game','result'];
function showScreen(name) {
  SCREENS.forEach(s => {
    const el = document.getElementById(`screen-${s}`);
    if (el) el.style.display = s === name ? 'flex' : 'none';
  });
  gs.screen = name;
}

function detachListeners() {
  gs.unsubscribes.forEach(fn => { try{ fn(); }catch(_){} });
  gs.unsubscribes = [];
}

// =====================================================
// セットアップ画面 → ルーム作成 → QR表示
// =====================================================
// =====================================================
// テストモード（1人で即スタート）
// =====================================================
document.getElementById('btn-test').addEventListener('click', () => {
  initAudio();
  const name = document.getElementById('input-name').value.trim() || 'ホスト';
  gs.myUid      = 'test';
  gs.myIndex    = 0;
  gs.playerCount = 1;
  gs.seed       = Math.floor(Math.random() * 0xFFFFFF);
  gs.roomId     = null;
  startCountdownFrom(Date.now() + 2000, gs.seed);
});

document.getElementById('btn-create').addEventListener('click', async () => {
  initAudio();
  const name  = document.getElementById('input-name').value.trim() || 'ホスト';
  const count = parseInt(document.getElementById('select-count').value);

  gs.myUid      = uid();
  gs.myIndex    = 0;
  gs.playerCount = count;
  gs.seed       = Math.floor(Math.random() * 0xFFFFFF);

  // 短いルームコードでFirebaseにルームを作成
  gs.roomId = generateRoomCode();
  const roomRef = ref(db, `rooms/${gs.roomId}`);
  await set(roomRef, {
    host: gs.myUid,
    playerCount: count,
    status: 'waiting',
    seed: gs.seed,
    players: { [gs.myUid]: { name, index: 0, joinedAt: Date.now() } },
  });

  // 参加者向けのURLを生成してQRコードを表示
  const joinUrl = new URL('index.html', window.location.href).href + '?room=' + gs.roomId;
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), {
    text: joinUrl,
    width: 240, height: 240,
    colorDark: '#ffffff', colorLight: '#0a0a1a',
    correctLevel: QRCode.CorrectLevel.L, // エラー訂正を最小にしてQRを単純化
  });
  document.getElementById('join-url').textContent = joinUrl;
  document.getElementById('btn-join-self').href = joinUrl;

  showScreen('waiting');
  listenRoom();
});

// =====================================================
// 待機画面
// =====================================================
function listenRoom() {
  const roomRef = ref(db, `rooms/${gs.roomId}`);
  const unsub = onValue(roomRef, snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    updateWaitingUI(data);
    if (data.status === 'countdown') {
      detachListeners();
      startCountdownFrom(data.startAt, data.seed);
    }
  });
  gs.unsubscribes.push(unsub);
}

function updateWaitingUI(data) {
  const sorted = data.players
    ? Object.entries(data.players).sort((a,b) => a[1].joinedAt - b[1].joinedAt)
    : [];

  // プレイヤーリスト更新
  const list = document.getElementById('waiting-players');
  list.innerHTML = '';
  sorted.forEach(([id, p], i) => {
    const li = document.createElement('div');
    li.className = 'waiting-player' + (id === gs.myUid ? ' me' : '');
    li.textContent = `P${i+1}  ${p.name}${id === gs.myUid ? ' 👑 ホスト' : ''}`;
    list.appendChild(li);
  });

  // スタートボタンの状態
  const ready = sorted.length === data.playerCount;
  const startBtn = document.getElementById('btn-start');
  startBtn.disabled = !ready;
  startBtn.textContent = ready
    ? '▶ START!'
    : `待機中… ${sorted.length} / ${data.playerCount}人`;
}

document.getElementById('btn-start').addEventListener('click', async () => {
  const startAt = serverNow() + COUNTDOWN_MS; // サーバー時刻基準で設定
  await update(ref(db, `rooms/${gs.roomId}`), { status: 'countdown', startAt, seed: gs.seed });
});

// =====================================================
// カウントダウン → ゲーム開始
// =====================================================
async function startCountdownFrom(startAtMs, seed) {
  gs.seed = seed;
  showScreen('game');
  buildGameUI();
  resizeCanvas();

  const scoreWithPart = assignParts(gs.playerCount, gs.myIndex, seed);
  gs.notes = buildNotes(scoreWithPart);
  gs.totalNotes = gs.notes.length;

  const allBeats = [...MELODY_SCORE, ...HARMONY_SCORE, ...BASS_SCORE];
  const last = allBeats.reduce((a,b) => (b[1]+b[2]) > (a[1]+a[2]) ? b : a);
  gs.songDuration = (last[1] + last[2]) * BEAT_SEC + 1;

  gs.combo = 0; gs.maxCombo = 0; gs.score = 0;
  gs.perfect = 0; gs.good = 0; gs.miss = 0;
  gs.btnHeld = false;
  stopAllNotes();
  updateHeader();

  const overlay = document.getElementById('countdown-overlay');
  overlay.style.display = 'flex';
  const tick = () => {
    const rem = startAtMs - serverNow(); // サーバー時刻基準で残り時間を計算
    if (rem > 0) {
      overlay.textContent = Math.ceil(rem/1000) <= 3 ? Math.ceil(rem/1000) : '🎵';
      setTimeout(tick, 100);
    } else {
      overlay.style.display = 'none';
      beginPlay(startAtMs);
    }
  };
  tick();
}

function beginPlay(startAtMs) {
  initAudio();
  gs.notes.forEach(n => n.startTime += FALL_TIME);
  gs.songDuration += FALL_TIME;
  // サーバー時刻基準の経過時間で補正することで全端末のタイミングを統一する
  const elapsed = Math.max(0, (serverNow() - startAtMs) / 1000);
  gs.startTime = audioCtx.currentTime - elapsed;
  gs.animFrame = requestAnimationFrame(renderFrame);
}

// =====================================================
// ゲームUI構築
// =====================================================
function buildGameUI() {
  const btnArea = document.getElementById('btn-area');
  btnArea.innerHTML = '';
  // renderFrameと同じ固定順で並べることでボタンとレーンの位置を一致させる
  const PART_ORDER = ['melody', 'harmony', 'bass'];
  const assigned = assignParts(gs.playerCount, gs.myIndex, gs.seed);
  const myParts = PART_ORDER.filter(p => assigned.some(n => n[3] === p));
  const partInfo = {
    melody:  { label:'MELODY',  icon:'🎵' },
    harmony: { label:'HARMONY', icon:'🎶' },
    bass:    { label:'BASS',    icon:'🎹' },
  };
  // パートごとに独立したボタンを生成
  myParts.forEach(part => {
    const btn = document.createElement('button');
    btn.id = `btn-${part}`;
    btn.className = `big-btn big-btn-${part}`;
    btn.innerHTML = `<span class="btn-icon">${partInfo[part].icon}</span><span class="btn-label">${partInfo[part].label}</span>`;
    btn.addEventListener('pointerdown', e => { e.preventDefault(); onBtnDown(part); });
    btn.addEventListener('pointerup',   e => { e.preventDefault(); onBtnUp(part); });
    btn.addEventListener('pointerleave',e => { e.preventDefault(); onBtnUp(part); });
    btn.addEventListener('pointercancel',e=>{ e.preventDefault(); onBtnUp(part); });
    btnArea.appendChild(btn);
  });
  document.getElementById('part-label').textContent = myParts.map(p => partInfo[p].label).join(' + ');
}

// =====================================================
// ボタン入力
// =====================================================
function onBtnDown(part) {
  if (gs.screen !== 'game') return;
  const btn = document.getElementById(`btn-${part}`);
  if (btn) btn.classList.add('pressed');
  const now = getCurrentTime();
  let best = null, bestDiff = Infinity;
  // そのパートのノーツだけ対象にする
  for (const n of gs.notes) {
    if (n.judged || n.part !== part) continue;
    const diff = Math.abs(now - n.startTime);
    if (diff < bestDiff && diff <= GOOD_WINDOW + 0.05) { bestDiff = diff; best = n; }
  }
  if (best) {
    if (bestDiff <= PERFECT_WINDOW) judgeNote(best, 'perfect');
    else judgeNote(best, 'good');
    if (best.isLong) {
      playNote(best.note, best.part);
      best.holdActive = true;
      btn && btn.classList.add('holding');
    } else {
      playNote(best.note, best.part);
      setTimeout(() => stopNote(best.note), best.duration * 1000);
    }
  }
}
function onBtnUp(part) {
  const btn = document.getElementById(`btn-${part}`);
  if (btn) btn.classList.remove('pressed', 'holding');
  for (const n of gs.notes) {
    if (n.part === part && n.holdActive && !n.holdReleased) {
      n.holdActive = false; n.holdReleased = true;
      stopNote(n.note);
    }
  }
}

// =====================================================
// 判定
// =====================================================
function judgeNote(note, judgment) {
  note.judged = true; note.judgment = judgment;
  if (judgment === 'perfect') {
    gs.perfect++; gs.score += 1000 + gs.combo * 10; gs.combo++;
    showJudgment('PERFECT ✨', 'var(--perfect-color)');
  } else {
    gs.good++; gs.score += 500 + gs.combo * 5; gs.combo++;
    showJudgment('GOOD!', 'var(--good-color)');
  }
  if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;
  updateHeader();
}
function showJudgment(text, color) {
  const el = document.getElementById('judgment-display');
  el.textContent = text; el.style.color = color;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}
function updateHeader() {
  document.getElementById('combo-val').textContent = gs.combo;
  document.getElementById('score-val').textContent = gs.score.toLocaleString();
}

// =====================================================
// 描画
// =====================================================
function resizeCanvas() {
  const canvas = document.getElementById('track-canvas');
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width  * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
}

function renderFrame() {
  if (gs.screen !== 'game') return;
  const canvas = document.getElementById('track-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, dpr = devicePixelRatio;
  const now = getCurrentTime();

  // 担当パートをノーツから確定（固定順）
  const PART_ORDER = ['melody', 'harmony', 'bass'];
  const myParts = PART_ORDER.filter(p => gs.notes.some(n => n.part === p));
  const laneCount = myParts.length;
  const laneW = W / laneCount;

  ctx.clearRect(0,0,W,H);

  // レーン背景・区切り線・ラベル
  const PART_NAMES = { melody:'MELODY', harmony:'HARMONY', bass:'BASS' };
  myParts.forEach((part, i) => {
    const lx = i * laneW;
    // 交互に薄い背景
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.018)' : 'rgba(0,0,0,0)';
    ctx.fillRect(lx, 0, laneW, H);
    // 区切り線
    if (i > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1 * dpr;
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
    }
    // パートラベル（上部）
    ctx.save();
    ctx.font = `bold ${10*dpr}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = PART_COLOR[part].stroke;
    ctx.globalAlpha = 0.5;
    ctx.fillText(PART_NAMES[part], lx + laneW / 2, 14 * dpr);
    ctx.restore();
  });

  // ヒットライン
  const hitY = H - 2 * dpr;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2 * dpr;
  ctx.beginPath(); ctx.moveTo(0, hitY); ctx.lineTo(W, hitY); ctx.stroke();

  // ノーツ描画（パートのレーンに配置）
  for (const n of gs.notes) {
    const laneIndex = myParts.indexOf(n.part);
    if (laneIndex === -1) continue;
    const lx = laneIndex * laneW;
    const noteX = lx + 6 * dpr;
    const noteW = laneW - 12 * dpr;

    const bottomY = hitY - (n.startTime - now) * SCROLL_SPEED * dpr;
    const topY    = hitY - (n.startTime + n.duration - now) * SCROLL_SPEED * dpr;
    if (topY > H + 50*dpr || bottomY < -50*dpr) continue;
    const noteH = bottomY - topY;
    const r = Math.min(10*dpr, Math.max(noteH/2, 3*dpr));
    const colors = n.judged
      ? (JUDGED_COLOR[n.judgment] || JUDGED_COLOR.miss)
      : (PART_COLOR[n.part] || PART_COLOR.melody);
    ctx.save();
    ctx.fillStyle = colors.fill; ctx.strokeStyle = colors.stroke; ctx.lineWidth = 2 * dpr;
    if (n.isLong && !n.judged) {
      ctx.beginPath();
      ctx.moveTo(noteX, bottomY);
      ctx.lineTo(noteX, topY + r);
      ctx.quadraticCurveTo(noteX, topY, noteX + r, topY);
      ctx.lineTo(noteX + noteW - r, topY);
      ctx.quadraticCurveTo(noteX + noteW, topY, noteX + noteW, topY + r);
      ctx.lineTo(noteX + noteW, bottomY);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      if (n.holdActive) { ctx.shadowColor = colors.stroke; ctx.shadowBlur = 18*dpr; ctx.fill(); }
    } else {
      const dH = Math.max(noteH, 8*dpr);
      ctx.beginPath(); ctx.roundRect(noteX, bottomY - dH, noteW, dH, r);
      ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }

  // オートミス判定
  for (const n of gs.notes) {
    if (!n.judged && now > n.startTime + GOOD_WINDOW + 0.05) {
      n.judged = true; n.judgment = 'miss';
      gs.miss++; gs.combo = 0; updateHeader();
      showJudgment('MISS', 'var(--miss-color)');
    }
  }

  // ボタングロー（パートごとに独立）
  for (const part of ['melody', 'harmony', 'bass']) {
    const btn = document.getElementById(`btn-${part}`);
    if (btn) btn.classList.toggle('holding', gs.notes.some(n => n.holdActive && n.part === part));
  }

  // 進捗バー
  document.getElementById('progress-fill').style.width = (Math.min(1, now / gs.songDuration) * 100) + '%';

  if (now > gs.songDuration + 1.5) { endGame(); return; }
  gs.animFrame = requestAnimationFrame(renderFrame);
}

// =====================================================
// ゲーム終了
// =====================================================
function endGame() {
  if (gs.animFrame) { cancelAnimationFrame(gs.animFrame); gs.animFrame = null; }
  stopAllNotes();
  // 参加者が再リスンできるようにFirebaseをwaitingに戻す
  if (gs.roomId) update(ref(db, `rooms/${gs.roomId}`), { status: 'waiting' }).catch(() => {});

  const total = gs.totalNotes;
  const acc   = total > 0 ? Math.round(((gs.perfect*100 + gs.good*50) / (total*100)) * 100) : 0;
  const rank  = acc >= 95 ? 'S' : acc >= 85 ? 'A' : acc >= 70 ? 'B' : acc >= 50 ? 'C' : 'D';
  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-rank').className = 'result-rank ' + rank;
  document.getElementById('result-score').textContent = gs.score.toLocaleString();
  document.getElementById('result-perfect').textContent = gs.perfect;
  document.getElementById('result-good').textContent = gs.good;
  document.getElementById('result-miss').textContent = gs.miss;
  document.getElementById('result-maxcombo').textContent = gs.maxCombo;
  document.getElementById('result-accuracy').textContent = `Accuracy: ${acc}%`;
  showScreen('result');
}

// =====================================================
// リザルトボタン
// =====================================================
// もう一度: 待機画面に戻りSTARTボタンで再スタート
document.getElementById('btn-retry').addEventListener('click', async () => {
  await update(ref(db, `rooms/${gs.roomId}`), { status: 'waiting' });
  listenRoom();
  showScreen('waiting');
});
// 終了: セットアップ画面へ
document.getElementById('btn-home').addEventListener('click', () => {
  if (gs.animFrame) cancelAnimationFrame(gs.animFrame);
  stopAllNotes();
  detachListeners();
  showScreen('setup');
});

// =====================================================
// リサイズ
// =====================================================
window.addEventListener('resize', () => { if (gs.screen === 'game') resizeCanvas(); });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

showScreen('setup');
</script>

<style>
:root {

@keyframes judgePop {

  flex:1; border:none; border-radius:0 0 14px 14px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;

.big-btn .btn-label { font-size:11px; opacity:0.7; }
.big-btn.pressed  { filter:brightness(1.6); border-top-color:rgba(255,255,255,0.7); }

@keyframes btnGlow { 0%{filter:brightness(1.5)} 100%{filter:brightness(2.0)} }
.big-btn-melody  { background:linear-gradient(180deg,#c8960a,#8a6400); color:#fff8d0; box-shadow:0 4px 0 rgba(0,0,0,0.4); }
.big-btn-harmony { background:linear-gradient(180deg,#c0166e,#7a0040); color:#ffd0e8; box-shadow:0 4px 0 rgba(0,0,0,0.4); }
.big-btn-bass    { background:linear-gradient(180deg,#0090aa,#005566); color:#d0f8ff; box-shadow:0 4px 0 rgba(0,0,0,0.4); }

#screen-result { background:radial-gradient(ellipse at 50% 40%,#1a1a3a 0%,var(--bg-dark) 70%); gap:14px; }

</head>
